<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LibrarySys — Library Management System</title>
  <meta name="description" content="Modern C++ powered library management system." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">📚</div>
      <div>
        <div class="logo-name">LibrarySys</div>
        <div class="logo-sub">Management System</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">🏠 Dashboard</button>
      <button class="nav-btn" id="nav-books" onclick="showPage('books')">📖 Books</button>
      <button class="nav-btn" id="nav-members" onclick="showPage('members')">👥 Members</button>
      <button class="nav-btn" id="nav-transactions" onclick="showPage('transactions')">🔄 Transactions</button>
      <button class="nav-btn" id="nav-borrow" onclick="showPage('borrow')">📤 Borrow / Return</button>
    </nav>
    <div class="sidebar-footer">
      <div class="api-status" id="api-status"><span class="status-dot"></span> Connecting...</div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 class="page-title" id="page-title">Dashboard</h1>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="global-search" placeholder="Search books..." oninput="handleGlobalSearch(this.value)" />
      </div>
    </header>

    <!-- Dashboard -->
    <section class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card" style="--accent:#6366f1"><div class="stat-icon">📚</div><div class="stat-value" id="stat-books">—</div><div class="stat-label">Total Books</div></div>
        <div class="stat-card" style="--accent:#10b981"><div class="stat-icon">✅</div><div class="stat-value" id="stat-available">—</div><div class="stat-label">Available</div></div>
        <div class="stat-card" style="--accent:#f59e0b"><div class="stat-icon">👥</div><div class="stat-value" id="stat-members">—</div><div class="stat-label">Members</div></div>
        <div class="stat-card" style="--accent:#ef4444"><div class="stat-icon">🔄</div><div class="stat-value" id="stat-active-borrows">—</div><div class="stat-label">Active Borrows</div></div>
      </div>
      <div class="dashboard-grid">
        <div class="card"><div class="card-header"><h2 class="card-title">Recent Books</h2><button class="btn btn-sm" onclick="showPage('books')">View All →</button></div><div id="recent-books-list" class="item-list"></div></div>
        <div class="card"><div class="card-header"><h2 class="card-title">Active Borrows</h2><button class="btn btn-sm" onclick="showPage('transactions')">View All →</button></div><div id="active-borrows-list" class="item-list"></div></div>
      </div>
    </section>

    <!-- Books -->
    <section class="page" id="page-books">
      <div class="page-actions"><button class="btn btn-primary" onclick="openModal('add-book-modal')">+ Add Book</button></div>
      <div class="card"><div id="books-table-container"></div></div>
    </section>

    <!-- Members -->
    <section class="page" id="page-members">
      <div class="page-actions"><button class="btn btn-primary" onclick="openModal('add-member-modal')">+ Add Member</button></div>
      <div class="card"><div id="members-table-container"></div></div>
    </section>

    <!-- Transactions -->
    <section class="page" id="page-transactions">
      <div class="card"><div id="transactions-table-container"></div></div>
    </section>

    <!-- Borrow / Return -->
    <section class="page" id="page-borrow">
      <div class="borrow-grid">
        <div class="card">
          <div class="card-header"><h2 class="card-title">📤 Borrow a Book</h2></div>
          <form class="form" onsubmit="handleBorrow(event)">
            <label class="form-label">Member ID</label>
            <input type="number" id="borrow-member-id" class="form-input" placeholder="e.g. 1" required />
            <label class="form-label">Book ID</label>
            <input type="number" id="borrow-book-id" class="form-input" placeholder="e.g. 3" required />
            <button type="submit" class="btn btn-primary btn-full">Issue Book</button>
          </form>
          <div id="borrow-result" class="result-box hidden"></div>
        </div>
        <div class="card">
          <div class="card-header"><h2 class="card-title">📥 Return a Book</h2></div>
          <form class="form" onsubmit="handleReturn(event)">
            <label class="form-label">Transaction ID</label>
            <input type="number" id="return-tx-id" class="form-input" placeholder="e.g. 1" required />
            <button type="submit" class="btn btn-success btn-full">Return Book</button>
          </form>
          <div id="return-result" class="result-box hidden"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modals -->
  <div class="modal-overlay hidden" id="add-book-modal">
    <div class="modal">
      <div class="modal-header"><h3>Add New Book</h3><button class="modal-close" onclick="closeModal('add-book-modal')">✕</button></div>
      <form class="form" onsubmit="handleAddBook(event)">
        <label class="form-label">Title *</label><input type="text" id="book-title" class="form-input" required />
        <label class="form-label">Author *</label><input type="text" id="book-author" class="form-input" required />
        <label class="form-label">ISBN</label><input type="text" id="book-isbn" class="form-input" placeholder="978-..." />
        <label class="form-label">Category</label><input type="text" id="book-category" class="form-input" placeholder="e.g. Fiction" />
        <label class="form-label">Copies</label><input type="number" id="book-copies" class="form-input" value="1" min="1" />
        <div class="modal-footer">
          <button type="button" class="btn" onclick="closeModal('add-book-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Book</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="add-member-modal">
    <div class="modal">
      <div class="modal-header"><h3>Register New Member</h3><button class="modal-close" onclick="closeModal('add-member-modal')">✕</button></div>
      <form class="form" onsubmit="handleAddMember(event)">
        <label class="form-label">Full Name *</label><input type="text" id="member-name" class="form-input" required />
        <label class="form-label">Email *</label><input type="email" id="member-email" class="form-input" required />
        <div class="modal-footer">
          <button type="button" class="btn" onclick="closeModal('add-member-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
